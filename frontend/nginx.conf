server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # script-src / connect-src / frame-src extended for Google Identity Services (GIS).
    # Conscious CSP relaxation to support an external IdP (see tasks/google-auth-task.md §1.1).
    # Offline/PWA note: login is unavailable without network access to accounts.google.com.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://accounts.google.com; connect-src 'self' https://api.statok.simk.in.ua https://accounts.google.com; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; manifest-src 'self'; worker-src 'self'; frame-src https://accounts.google.com" always;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
